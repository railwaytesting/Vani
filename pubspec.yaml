name: vani
description: "Vani ISL – Indian Sign Language Translation App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # ── existing ──────────────────────────────
  http: ^1.2.0
  camera: ^0.11.0+2
  cupertino_icons: ^1.0.8
  web_socket_channel: ^3.0.1

  # Localization
  flutter_localizations:
    sdk: flutter

  # ── Emergency SOS ─────────────────────────

  # Local storage for emergency contacts (offline, no backend)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Shake detection — Android/iOS only, safe no-op on web
  shake: ^3.0.0
  # GPS — geolocator on mobile, dart:html on web (conditional import)
  geolocator: ^13.0.0

  # Deep links — sms:, tel:, https:, wa.me:
  url_launcher: ^6.3.0

  # Haptic vibration — mobile only, safe no-op on web
  vibration: ^2.0.0

  # Text-to-speech — EN + regional Indian languages
  flutter_tts: ^4.0.2

  # ── ISL Assistant ─────────────────────────
  # Voice input for ISL Assistant
  speech_to_text: ^7.3.0
  google_fonts: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

  # Hive code generation — run once after adding
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  fonts:
    - family: Plus Jakarta Sans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Light.ttf
          weight: 300
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/PlusJakartaSans-Italic[wght].ttf
          style: italic

flutter_launcher_icons:
  android: true
  ios: true
  image_path: logo/vanilogo.png
  adaptive_icon_foreground: logo/vanilogo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground_inset: 18
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: true
    image_path: logo/vanilogo.png
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: logo/vanilogo.png
    icon_size: 256
  macos:
    generate: true
    image_path: logo/vanilogo.png

flutter_native_splash:
  color: "#ffffff"
  android: true
  ios: true
  web: false
  android_12:
    color: "#ffffff"
    icon_background_color: "#ffffff"